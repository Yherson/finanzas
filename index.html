<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0c0c0e">
<title>Finanzas</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500&family=IBM+Plex+Serif:wght@300;400;500&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0c0c0e;--s1:#111114;--s2:#17171b;
  --border:#222228;--border2:#2e2e36;
  --text:#e8e6e0;--muted:#52515a;--muted2:#7a7888;
  --gold:#c9a84c;--gold-d:rgba(201,168,76,0.12);--gold-b:rgba(201,168,76,0.35);
  --red:#c07070;--red-d:rgba(192,112,112,0.12);--red-b:rgba(192,112,112,0.35);
  --green:#5aaa80;--green-d:rgba(90,170,128,0.12);--green-b:rgba(90,170,128,0.35);
}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-size:14px;font-weight:300;-webkit-font-smoothing:antialiased;}
body{display:flex;justify-content:center;padding:28px 16px 80px;}
.page{width:100%;max-width:440px;}

/* HEADER */
.header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;}
.brand{font-family:'IBM Plex Serif',serif;font-size:20px;font-weight:400;color:var(--text);}
.brand-sub{font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);margin-top:3px;}
.dt-wrap{text-align:right;}
.dt-time{font-family:'IBM Plex Serif',serif;font-size:20px;font-weight:300;color:var(--text);line-height:1;}
.dt-date{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-top:4px;}
.rule{height:1px;background:linear-gradient(90deg,var(--gold) 0%,var(--border) 50%,transparent 100%);margin-bottom:24px;}

/* TIPO TOGGLE */
.tipo-row{display:flex;border-bottom:1px solid var(--border);margin-bottom:28px;}
.tipo-btn{flex:1;padding:11px 0;background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-1px;font-family:'IBM Plex Sans',sans-serif;font-size:10px;font-weight:400;letter-spacing:2px;text-transform:uppercase;color:var(--muted);cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent;}
.tipo-btn.ag{color:var(--red);border-bottom-color:var(--red);}
.tipo-btn.ai{color:var(--green);border-bottom-color:var(--green);}

/* SECCIONES */
.section{margin-bottom:22px;}
.sec-label{font-size:9px;font-weight:500;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}

/* MONTO */
.monto-wrap{display:flex;align-items:baseline;gap:8px;padding-bottom:10px;border-bottom:1px solid var(--border2);}
.monto-sym{font-family:'IBM Plex Serif',serif;font-size:22px;font-weight:300;color:var(--muted);}
.monto-inp{flex:1;background:none;border:none;outline:none;font-family:'IBM Plex Serif',serif;font-size:44px;font-weight:400;color:var(--text);letter-spacing:-1px;width:100%;-webkit-appearance:none;}
.monto-inp::placeholder{color:var(--border2);}
.err-msg{font-size:10px;color:var(--red);margin-top:5px;letter-spacing:0.3px;}

/* CHIPS */
.chips{display:flex;flex-wrap:wrap;gap:7px;align-items:center;}
.chip{display:flex;align-items:center;border-radius:2px;border:1px solid var(--border2);background:transparent;overflow:hidden;transition:border-color .15s;}
.chip-lbl{padding:7px 13px;font-family:'IBM Plex Sans',sans-serif;font-size:10px;font-weight:400;letter-spacing:1px;text-transform:uppercase;color:var(--muted2);cursor:pointer;background:none;border:none;-webkit-tap-highlight-color:transparent;white-space:nowrap;}
.chip-edit{display:flex;align-items:center;padding:7px 8px;background:none;border:none;border-left:1px solid var(--border);cursor:pointer;color:var(--muted);transition:all .15s;-webkit-tap-highlight-color:transparent;}
.chip:hover{border-color:var(--muted);}
.chip.sel-g{background:var(--red-d);border-color:var(--red-b);}
.chip.sel-g .chip-lbl{color:var(--red);}
.chip.sel-g .chip-edit{border-left-color:var(--red-b);}
.chip.sel-i{background:var(--green-d);border-color:var(--green-b);}
.chip.sel-i .chip-lbl{color:var(--green);}
.chip.sel-i .chip-edit{border-left-color:var(--green-b);}
.chip-add{padding:7px 12px;border-radius:2px;border:1px dashed var(--border2);background:none;font-family:'IBM Plex Sans',sans-serif;font-size:10px;letter-spacing:1px;color:var(--muted);cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;}
.chip-add:hover{border-color:var(--muted);color:var(--text);}

/* SUBCHIPS */
.sub-section{margin-top:16px;}
.subchips{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-top:8px;}
.subchip{display:flex;align-items:center;border-radius:2px;border:1px solid var(--border);background:var(--s2);overflow:hidden;}
.subchip-lbl{padding:5px 10px;font-family:'IBM Plex Sans',sans-serif;font-size:9px;font-weight:400;letter-spacing:1px;text-transform:uppercase;color:var(--muted2);cursor:pointer;background:none;border:none;-webkit-tap-highlight-color:transparent;white-space:nowrap;}
.subchip-edit{display:flex;align-items:center;padding:5px 6px;background:none;border:none;border-left:1px solid var(--border);cursor:pointer;color:var(--muted);}
.subchip.sel-g{background:var(--red-d);border-color:var(--red-b);}
.subchip.sel-g .subchip-lbl{color:var(--red);}
.subchip.sel-i{background:var(--green-d);border-color:var(--green-b);}
.subchip.sel-i .subchip-lbl{color:var(--green);}
.subchip-add{padding:5px 9px;border-radius:2px;border:1px dashed var(--border);background:none;font-family:'IBM Plex Sans',sans-serif;font-size:9px;letter-spacing:1px;color:var(--muted);cursor:pointer;-webkit-tap-highlight-color:transparent;}

/* INLINE FORM */
.inline-form{display:none;align-items:center;gap:7px;margin-top:10px;flex-wrap:wrap;}
.inline-form.on{display:flex;}
.inline-inp{flex:1;min-width:130px;background:var(--s2);border:1px solid var(--border2);border-radius:2px;padding:9px 11px;font-family:'IBM Plex Sans',sans-serif;font-size:12px;color:var(--text);outline:none;-webkit-appearance:none;}
.inline-inp::placeholder{color:var(--muted);}
.inline-inp:focus{border-color:var(--gold-b);}
.inline-ok{padding:9px 16px;border-radius:2px;border:1px solid var(--gold-b);background:var(--gold-d);font-family:'IBM Plex Sans',sans-serif;font-size:9px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);cursor:pointer;transition:all .15s;white-space:nowrap;}
.inline-ok:hover{background:var(--gold);color:var(--bg);}
.inline-cancel{padding:9px 11px;border-radius:2px;border:1px solid var(--border);background:none;font-size:12px;color:var(--muted);cursor:pointer;}

/* MODAL EDITAR CAT */
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:100;align-items:flex-end;justify-content:center;}
.modal-ov.show{display:flex;}
.modal-box{width:100%;max-width:440px;background:var(--s1);border:1px solid var(--border2);border-bottom:none;border-radius:12px 12px 0 0;padding:22px 20px 40px;animation:slideUp .22s ease;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-title{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.modal-title-txt{font-size:10px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}
.modal-close{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:0 2px;line-height:1;}
.modal-inp{width:100%;background:var(--s2);border:1px solid var(--border2);border-radius:2px;padding:12px 14px;font-family:'IBM Plex Sans',sans-serif;font-size:14px;font-weight:300;color:var(--text);outline:none;margin-bottom:12px;-webkit-appearance:none;}
.modal-inp:focus{border-color:var(--gold-b);}
.modal-btns{display:flex;gap:8px;}
.mbtn{flex:1;padding:12px;border-radius:2px;font-family:'IBM Plex Sans',sans-serif;font-size:9px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all .15s;border:none;}
.mbtn-save{background:var(--gold-d);border:1px solid var(--gold-b);color:var(--gold);}
.mbtn-save:hover{background:var(--gold);color:var(--bg);}
.mbtn-del{background:var(--red-d);border:1px solid var(--red-b);color:var(--red);}
.mbtn-cancel{background:none;border:1px solid var(--border2);color:var(--muted2);flex:.6;}

/* DIVIDER */
.div{border:none;border-top:1px solid var(--border);margin:20px 0;}

/* CAMPOS */
.row{display:flex;gap:16px;}
.row .section{flex:1;}
.row .section.wide{flex:1.8;}
.text-inp{width:100%;background:none;border:none;border-bottom:1px solid var(--border);padding:9px 0;font-family:'IBM Plex Sans',sans-serif;font-size:13px;font-weight:300;color:var(--text);outline:none;-webkit-appearance:none;}
.text-inp:focus{border-bottom-color:var(--border2);}
.text-inp::placeholder{color:var(--muted);}
input[type="date"].text-inp::-webkit-calendar-picker-indicator{filter:invert(0.3);cursor:pointer;}

/* BTN GUARDAR */
.btn-save{width:100%;padding:15px;border-radius:2px;border:none;font-family:'IBM Plex Sans',sans-serif;font-size:10px;font-weight:500;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s;margin-top:8px;-webkit-tap-highlight-color:transparent;}
.btn-save:active{transform:scale(.99);opacity:.85;}
.btn-save:disabled{opacity:.3;cursor:not-allowed;transform:none;}
.btn-g{background:var(--red-d);border:1px solid var(--red-b);color:var(--red);}
.btn-g:hover:not(:disabled){background:rgba(192,112,112,.25);}
.btn-i{background:var(--green-d);border:1px solid var(--green-b);color:var(--green);}
.btn-i:hover:not(:disabled){background:rgba(90,170,128,.25);}

/* ESTADO */
.estado{margin-top:12px;font-size:9px;font-weight:400;letter-spacing:2px;text-transform:uppercase;text-align:center;color:var(--muted);min-height:14px;}
.estado.ok{color:var(--green);}
.estado.fail{color:var(--red);}

/* OFFLINE */
.offline-bar{display:none;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:#b89040;background:#1a1508;border:1px solid #3a2e10;border-radius:2px;padding:8px 12px;margin-bottom:16px;}

/* RESPONSIVE */
@media(max-width:360px){
  .monto-inp{font-size:36px;}
  .row{flex-direction:column;gap:0;}
}
</style>
</head>
<body>

<!-- MODAL EDITAR/ELIMINAR CATEGORIA -->
<div class="modal-ov" id="modalOv" onclick="closeModalOv(event)">
  <div class="modal-box">
    <div class="modal-title">
      <span class="modal-title-txt" id="modalTitleTxt">Editar</span>
      <button class="modal-close" onclick="hideModal()">&#x2715;</button>
    </div>
    <input class="modal-inp" id="modalInp" type="text" maxlength="40" placeholder="Nombre...">
    <div class="modal-btns">
      <button class="mbtn mbtn-save" onclick="confirmModalEdit()">Guardar</button>
      <button class="mbtn mbtn-del" onclick="confirmModalDelete()">Eliminar</button>
      <button class="mbtn mbtn-cancel" onclick="hideModal()">Cancelar</button>
    </div>
  </div>
</div>

<div class="page">
  <div class="header">
    <div><div class="brand">Finanzas</div><div class="brand-sub">Registro personal</div></div>
    <div class="dt-wrap"><div class="dt-time" id="dtTime">--:--</div><div class="dt-date" id="dtDate">---</div></div>
  </div>
  <div class="rule"></div>
  <div class="offline-bar" id="offlineBar">Sin conexion - sincronizara al reconectar</div>

  <div class="tipo-row">
    <button class="tipo-btn ag" id="btnG" onclick="setTipo('gasto')">Gasto</button>
    <button class="tipo-btn" id="btnI" onclick="setTipo('ingreso')">Ingreso</button>
  </div>

  <div class="section">
    <div class="sec-label">Monto</div>
    <div class="monto-wrap">
      <span class="monto-sym">S/</span>
      <input class="monto-inp" id="monto" type="text" inputmode="decimal" placeholder="0.00"
        oninput="rawMonto=this.value.replace(/[^0-9.]/g,'')"
        onblur="if(rawMonto)this.value=parseFloat(rawMonto).toLocaleString('es-PE',{minimumFractionDigits:2,maximumFractionDigits:2})"
        onfocus="this.value=rawMonto">
    </div>
    <div class="err-msg" id="eMonto"></div>
  </div>

  <hr class="div">

  <div class="section">
    <div class="sec-label">Categoria</div>
    <div class="chips" id="chipsCat"></div>
    <div class="inline-form" id="addCatForm">
      <input class="inline-inp" id="addCatInp" placeholder="Nueva categoria..." maxlength="30" onkeydown="if(event.key==='Enter')confirmAddCat()">
      <button class="inline-ok" onclick="confirmAddCat()">Ok</button>
      <button class="inline-cancel" onclick="cancelInline('cat')">&#x2715;</button>
    </div>
    <div class="err-msg" id="eCat"></div>
    <div id="subSection" style="display:none">
      <div class="sub-section">
        <div class="sec-label">Subcategoria</div>
        <div class="subchips" id="subchips"></div>
        <div class="inline-form" id="addSubForm">
          <input class="inline-inp" id="addSubInp" placeholder="Nueva subcategoria..." maxlength="30" onkeydown="if(event.key==='Enter')confirmAddSub()">
          <button class="inline-ok" onclick="confirmAddSub()">Ok</button>
          <button class="inline-cancel" onclick="cancelInline('sub')">&#x2715;</button>
        </div>
      </div>
    </div>
  </div>

  <hr class="div">

  <div class="row">
    <div class="section">
      <div class="sec-label">Fecha</div>
      <input type="date" class="text-inp" id="fecha">
    </div>
    <div class="section wide">
      <div class="sec-label">Descripcion</div>
      <input type="text" class="text-inp" id="desc" placeholder="ej. Almuerzo trabajo" maxlength="80">
    </div>
  </div>

  <button class="btn-save btn-g" id="btnSave" onclick="guardar()">Registrar Gasto</button>
  <div class="estado" id="estado"></div>
</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
import { getFirestore, collection, addDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyCBEViX704HkJvpQBxCgb_r6so9c3efhr8",
  authDomain: "finanzas-personales-70e52.firebaseapp.com",
  projectId: "finanzas-personales-70e52",
  storageBucket: "finanzas-personales-70e52.firebasestorage.app",
  messagingSenderId: "433329691661",
  appId: "1:433329691661:web:8d2d39f30b52afedd78944"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
window._db = db;
window._addDoc = addDoc;
window._collection = collection;
window._serverTimestamp = serverTimestamp;
window._firebaseReady = true;
</script>

<script>
var tipo = 'gasto', rawMonto = '', catSel = '', subSel = '';
var modalMode = '', modalTarget = '', modalParent = '';
var today = new Date().toISOString().split('T')[0];

var defaultData = {
  gasto: {
    cats: ['Alimentacion','Transporte','Salud','Servicios','Entretenimiento','Ahorro','Alquiler'],
    subs: {
      'Alimentacion':    ['Desayuno','Almuerzo','Cena'],
      'Transporte':      ['Bus','Taxi','Gasolina','Estacionamiento'],
      'Salud':           ['Farmacia','Consulta','Laboratorio'],
      'Servicios':       ['Luz','Agua','Internet','Telefono'],
      'Entretenimiento': ['Streaming','Salida','Evento'],
      'Ahorro':          ['Fondo emergencia','Inversion','Meta'],
      'Alquiler':        ['Mensualidad','Mantenimiento']
    }
  },
  ingreso: {
    cats: ['Sueldo','Freelance','Negocio','Inversiones','Otro'],
    subs: {
      'Sueldo':      ['Mensual','Quincenal','Bono'],
      'Freelance':   ['Proyecto','Consultoria','Diseno'],
      'Negocio':     ['Ventas','Servicios','Comision'],
      'Inversiones': ['Dividendos','Intereses','Venta activo'],
      'Otro':        ['Regalo','Premio','Devolucion']
    }
  }
};

function loadData(){ try{var s=localStorage.getItem('ff_data');if(s)return JSON.parse(s);}catch(e){}return JSON.parse(JSON.stringify(defaultData)); }
function saveData(d){ localStorage.setItem('ff_data',JSON.stringify(d)); }
var data = loadData();

// DateTime
function updateDT(){
  var now=new Date();
  var dd=['Dom','Lun','Mar','Mie','Jue','Vie','Sab'];
  var mm=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  document.getElementById('dtTime').textContent=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
  document.getElementById('dtDate').textContent=dd[now.getDay()]+' '+now.getDate()+' '+mm[now.getMonth()];
}
updateDT(); setInterval(updateDT,30000);
document.getElementById('fecha').value = today;

// Online/offline
function checkOnline(){ document.getElementById('offlineBar').style.display=navigator.onLine?'none':'block'; }
window.addEventListener('online', checkOnline);
window.addEventListener('offline', checkOnline);
checkOnline();

// Render categorias
function renderCats(){
  var c=document.getElementById('chipsCat'); c.innerHTML='';
  data[tipo].cats.forEach(function(cat){
    var chip=document.createElement('div'); chip.className='chip'+(catSel===cat?' sel-'+(tipo==='gasto'?'g':'i'):'');
    var lbl=document.createElement('button'); lbl.className='chip-lbl'; lbl.textContent=cat; lbl.onclick=function(){selectCat(cat);};
    var ed=document.createElement('button'); ed.className='chip-edit';
    ed.innerHTML='<svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M8.5 1.5L10.5 3.5L4 10H2V8L8.5 1.5Z" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    ed.onclick=function(e){e.stopPropagation();showModal('cat',cat,'');};
    chip.appendChild(lbl); chip.appendChild(ed); c.appendChild(chip);
  });
  var add=document.createElement('button'); add.className='chip-add'; add.textContent='+ agregar'; add.onclick=function(){showInline('cat');};
  c.appendChild(add);
}

function renderSubs(){
  var sec=document.getElementById('subSection');
  if(!catSel){sec.style.display='none';return;}
  sec.style.display='block';
  var subs=data[tipo].subs[catSel]||[];
  var c=document.getElementById('subchips'); c.innerHTML='';
  subs.forEach(function(s){
    var sub=document.createElement('div'); sub.className='subchip'+(subSel===s?' sel-'+(tipo==='gasto'?'g':'i'):'');
    var lbl=document.createElement('button'); lbl.className='subchip-lbl'; lbl.textContent=s; lbl.onclick=function(){selectSub(s);};
    var ed=document.createElement('button'); ed.className='subchip-edit';
    ed.innerHTML='<svg width="10" height="10" viewBox="0 0 12 12" fill="none"><path d="M8.5 1.5L10.5 3.5L4 10H2V8L8.5 1.5Z" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    ed.onclick=function(e){e.stopPropagation();showModal('sub',s,catSel);};
    sub.appendChild(lbl); sub.appendChild(ed); c.appendChild(sub);
  });
  var add=document.createElement('button'); add.className='subchip-add'; add.textContent='+ agregar'; add.onclick=function(){showInline('sub');};
  c.appendChild(add);
}

function selectCat(c){ catSel=catSel===c?'':c; subSel=''; document.getElementById('eCat').textContent=''; cancelInline('cat'); cancelInline('sub'); renderCats(); renderSubs(); }
function selectSub(s){ subSel=subSel===s?'':s; renderSubs(); }

function showInline(t){
  if(t==='cat'){document.getElementById('addCatForm').classList.add('on');document.getElementById('addCatInp').focus();}
  else{if(!catSel)return;document.getElementById('addSubForm').classList.add('on');document.getElementById('addSubInp').focus();}
}
function cancelInline(t){
  if(t==='cat'){document.getElementById('addCatForm').classList.remove('on');document.getElementById('addCatInp').value='';}
  else{document.getElementById('addSubForm').classList.remove('on');document.getElementById('addSubInp').value='';}
}
function confirmAddCat(){
  var v=document.getElementById('addCatInp').value.trim(); if(!v) return;
  if(!data[tipo].cats.includes(v)){data[tipo].cats.push(v);data[tipo].subs[v]=[];saveData(data);}
  catSel=v; subSel=''; cancelInline('cat'); renderCats(); renderSubs();
}
function confirmAddSub(){
  var v=document.getElementById('addSubInp').value.trim(); if(!v||!catSel) return;
  if(!data[tipo].subs[catSel]) data[tipo].subs[catSel]=[];
  if(!data[tipo].subs[catSel].includes(v)){data[tipo].subs[catSel].push(v);saveData(data);}
  subSel=v; cancelInline('sub'); renderSubs();
}

// Modal editar/eliminar categorias
function showModal(mode,target,parent){
  modalMode=mode; modalTarget=target; modalParent=parent;
  document.getElementById('modalTitleTxt').textContent=mode==='cat'?'Editar categoria':'Editar subcategoria';
  document.getElementById('modalInp').value=target;
  document.getElementById('modalOv').classList.add('show');
  setTimeout(function(){document.getElementById('modalInp').focus();},300);
}
function hideModal(){ document.getElementById('modalOv').classList.remove('show'); }
function closeModalOv(e){ if(e.target===document.getElementById('modalOv')) hideModal(); }
function confirmModalEdit(){
  var v=document.getElementById('modalInp').value.trim(); if(!v) return;
  if(modalMode==='cat'){
    var idx=data[tipo].cats.indexOf(modalTarget);
    if(idx>=0){data[tipo].cats[idx]=v;var old=data[tipo].subs[modalTarget]||[];delete data[tipo].subs[modalTarget];data[tipo].subs[v]=old;if(catSel===modalTarget)catSel=v;saveData(data);}
  } else {
    var subs=data[tipo].subs[modalParent]||[];var idx2=subs.indexOf(modalTarget);
    if(idx2>=0){subs[idx2]=v;if(subSel===modalTarget)subSel=v;saveData(data);}
  }
  hideModal(); renderCats(); renderSubs();
}
function confirmModalDelete(){
  if(modalMode==='cat'){
    data[tipo].cats=data[tipo].cats.filter(function(c){return c!==modalTarget;});
    delete data[tipo].subs[modalTarget];
    if(catSel===modalTarget){catSel='';subSel='';}
    saveData(data);
  } else {
    data[tipo].subs[modalParent]=(data[tipo].subs[modalParent]||[]).filter(function(s){return s!==modalTarget;});
    if(subSel===modalTarget) subSel='';
    saveData(data);
  }
  hideModal(); renderCats(); renderSubs();
}

function setTipo(t){
  tipo=t; catSel=''; subSel='';
  document.getElementById('btnG').className='tipo-btn'+(t==='gasto'?' ag':'');
  document.getElementById('btnI').className='tipo-btn'+(t==='ingreso'?' ai':'');
  document.getElementById('btnSave').className='btn-save btn-'+(t==='gasto'?'g':'i');
  document.getElementById('btnSave').textContent='Registrar '+(t==='gasto'?'Gasto':'Ingreso');
  document.getElementById('estado').className='estado';
  document.getElementById('estado').textContent='';
  cancelInline('cat'); cancelInline('sub');
  renderCats(); renderSubs();
}

function validate(){
  var ok=true;
  if(!rawMonto||isNaN(parseFloat(rawMonto))||parseFloat(rawMonto)<=0){document.getElementById('eMonto').textContent='Ingresa un monto valido';ok=false;}
  if(!catSel){document.getElementById('eCat').textContent='Selecciona una categoria';ok=false;}
  return ok;
}

function resetForm(){
  rawMonto=''; catSel=''; subSel='';
  document.getElementById('monto').value='';
  document.getElementById('desc').value='';
  document.getElementById('fecha').value=today;
  renderCats(); renderSubs();
}

async function guardar(){
  if(!validate()) return;
  if(!window._firebaseReady){
    document.getElementById('estado').className='estado fail';
    document.getElementById('estado').textContent='Conectando con Firebase...';
    setTimeout(guardar, 1000); return;
  }
  var btn=document.getElementById('btnSave');
  var e=document.getElementById('estado');
  btn.disabled=true;
  e.className='estado'; e.textContent='Guardando...';
  try {
    var now=new Date();
    var registro = {
      fecha:          document.getElementById('fecha').value,
      fecha_ingreso:  now.toLocaleDateString('es-PE',{year:'numeric',month:'2-digit',day:'2-digit'}),
      hora_ingreso:   now.toLocaleTimeString('es-PE',{hour:'2-digit',minute:'2-digit',second:'2-digit'}),
      fechahora:      now.toLocaleString('es-PE',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit'}),
      tipo:           tipo,
      monto:          parseFloat(rawMonto),
      categoria:      catSel,
      subcategoria:   subSel,
      descripcion:    document.getElementById('desc').value.trim(),
      createdAt:      window._serverTimestamp()
    };
    await window._addDoc(window._collection(window._db,'registros'), registro);
    e.className='estado ok'; e.textContent='Registrado';
    resetForm();
  } catch(err) {
    e.className='estado fail'; e.textContent='Error: '+err.message;
  }
  btn.disabled=false;
  setTimeout(function(){e.className='estado';e.textContent='';},3000);
}

renderCats(); renderSubs();
</script>
</body>
</html>
