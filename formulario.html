<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0c0c0e">
<title>Finanzas — Registro</title>
<link rel="icon" type="image/svg+xml" href="fav_formulario.svg">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500&family=IBM+Plex+Serif:wght@300;400;500&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/formulario.css">
</head>
<body>

<!-- AUTH SCREEN -->
<div class="auth-screen show" id="authScreen">
  <div class="auth-card">
    <div class="auth-logo">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M2 9h14M2 5.5h10M2 12.5h7" stroke="#c9a84c" stroke-width="1.4" stroke-linecap="round"/></svg>
    </div>
    <div class="auth-title">Finanzas Formulario</div>
    <div class="auth-sub">Registra tus transacciones<br>desde tu celular.</div>
    <button class="auth-btn" onclick="loginConGoogle()">
      <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.47 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continuar con Google
    </button>
  </div>
</div>

<!-- FORMULARIO PRINCIPAL -->
<div class="page" id="mainPage">
  <div class="header">
    <div>
      <div class="brand">Finanzas</div>
      <div class="brand-sub">Registro personal</div>
    </div>
    <div class="dt-wrap">
      <div class="dt-time" id="dtTime">--:--</div>
      <div class="dt-date" id="dtDate">---</div>
    </div>
  </div>
  <div class="rule"></div>

  <div class="user-row">
    <span class="user-name" id="userName">Cargando...</span>
    <button class="user-out" onclick="logout()">Salir</button>
  </div>

  <div class="tipo-row">
    <button class="tipo-btn ag" id="btnG" onclick="setTipo('gasto')">Gasto</button>
    <button class="tipo-btn"    id="btnI" onclick="setTipo('ingreso')">Ingreso</button>
  </div>

  <div class="section">
    <div class="sec-label">Monto</div>
    <div class="monto-wrap">
      <span class="monto-sym">S/</span>
      <input class="monto-inp" id="monto" type="text" inputmode="decimal" placeholder="0.00"
        oninput="rawMonto=this.value.replace(/[^0-9.]/g,'')"
        onblur="if(rawMonto)this.value=parseFloat(rawMonto).toLocaleString('es-PE',{minimumFractionDigits:2,maximumFractionDigits:2})"
        onfocus="this.value=rawMonto">
    </div>
    <div class="err-msg" id="eMonto"></div>
  </div>

  <hr class="div">

  <div class="section">
    <div class="sec-label">Categoria</div>
    <div class="chips" id="chipsCat"></div>
    <div class="inline-form" id="addCatForm">
      <input class="inline-inp" id="addCatInp" placeholder="Nueva categoria..." maxlength="30"
             onkeydown="if(event.key==='Enter')confirmAddCat()">
      <button class="inline-ok"     onclick="confirmAddCat()">Ok</button>
      <button class="inline-cancel" onclick="cancelInline('cat')">&#x2715;</button>
    </div>
    <div class="err-msg" id="eCat"></div>
    <div id="subSection" style="display:none">
      <div class="sub-section">
        <div class="sec-label">Subcategoria</div>
        <div class="subchips" id="subchips"></div>
        <div class="inline-form" id="addSubForm">
          <input class="inline-inp" id="addSubInp" placeholder="Nueva subcategoria..." maxlength="30"
                 onkeydown="if(event.key==='Enter')confirmAddSub()">
          <button class="inline-ok"     onclick="confirmAddSub()">Ok</button>
          <button class="inline-cancel" onclick="cancelInline('sub')">&#x2715;</button>
        </div>
      </div>
    </div>
  </div>

  <hr class="div">

  <div class="row">
    <div class="section">
      <div class="sec-label">Fecha</div>
      <input type="date" class="text-inp" id="fecha">
    </div>
    <div class="section wide">
      <div class="sec-label">Descripcion</div>
      <input type="text" class="text-inp" id="desc" placeholder="ej. Almuerzo trabajo" maxlength="80">
    </div>
  </div>

  <button class="btn-save btn-g" id="btnSave" onclick="guardar()">Registrar Gasto</button>
  <div class="estado" id="estado"></div>
</div>

<!-- MODAL EDITAR CATEGORÍA -->
<div class="modal-ov" id="modalOv" onclick="if(event.target===this)hideModal()">
  <div class="modal-box">
    <div class="modal-title">
      <span class="modal-title-txt" id="modalTitleTxt">Editar</span>
      <button class="modal-close" onclick="hideModal()">&#x2715;</button>
    </div>
    <input class="modal-inp" id="modalInp" type="text" maxlength="40" placeholder="Nombre...">
    <div class="modal-btns">
      <button class="mbtn mbtn-save"   onclick="confirmModalEdit()">Guardar</button>
      <button class="mbtn mbtn-del"    onclick="confirmModalDelete()">Eliminar</button>
      <button class="mbtn mbtn-cancel" onclick="hideModal()">Cancelar</button>
    </div>
  </div>
</div>

<!-- Firebase (módulo ES) -->
<script type="module" src="js/firebase-config.js"></script>

<!-- Lógica del formulario (script normal, accede a window._*) -->
<script src="js/formulario.js"></script>

</body>
</html>
