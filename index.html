<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0c0c0e">
  <title>Finanzas</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500&family=IBM+Plex+Serif:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0c0c0e;
      --s1: #111114;
      --s2: #17171b;
      --border: #222228;
      --border2: #2e2e36;
      --text: #e8e6e0;
      --muted: #52515a;
      --muted2: #7a7888;
      --gold: #c9a84c;
      --gold-dim: rgba(201,168,76,0.12);
      --gold-bd: rgba(201,168,76,0.35);
      --red: #c07070;
      --red-dim: rgba(192,112,112,0.12);
      --red-bd: rgba(192,112,112,0.35);
      --green: #5aaa80;
      --green-dim: rgba(90,170,128,0.12);
      --green-bd: rgba(90,170,128,0.35);
    }

    html { height: 100%; }

    body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 14px;
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
      padding: 0;
      margin: 0;
    }

    /* ── LAYOUT ── */
    .page {
      max-width: 480px;
      margin: 0 auto;
      padding: 28px 20px 80px;
    }

    /* ── HEADER ── */
    .header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .brand {
      font-family: 'IBM Plex Serif', serif;
      font-size: 20px;
      font-weight: 400;
      color: var(--text);
      line-height: 1.1;
    }

    .brand-sub {
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 4px;
    }

    .dt-wrap { text-align: right; }

    .dt-time {
      font-family: 'IBM Plex Serif', serif;
      font-size: 20px;
      font-weight: 300;
      color: var(--text);
      line-height: 1;
    }

    .dt-date {
      font-size: 9px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 4px;
    }

    /* ── REGLA DECORATIVA ── */
    .rule {
      height: 1px;
      background: linear-gradient(90deg, var(--gold) 0%, var(--border) 50%, transparent 100%);
      margin-bottom: 24px;
    }

    /* ── TIPO TOGGLE ── */
    .tipo-row {
      display: flex;
      border-bottom: 1px solid var(--border);
      margin-bottom: 28px;
    }

    .tipo-btn {
      flex: 1;
      padding: 11px 0;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
      transition: all .2s;
      -webkit-tap-highlight-color: transparent;
    }

    .tipo-btn.ag { color: var(--red); border-bottom-color: var(--red); }
    .tipo-btn.ai { color: var(--green); border-bottom-color: var(--green); }

    /* ── SECCIONES ── */
    .section { margin-bottom: 24px; }

    .section-label {
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    /* ── MONTO ── */
    .monto-wrap {
      display: flex;
      align-items: baseline;
      gap: 8px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border2);
    }

    .monto-sym {
      font-family: 'IBM Plex Serif', serif;
      font-size: 22px;
      font-weight: 300;
      color: var(--muted);
    }

    .monto-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      font-family: 'IBM Plex Serif', serif;
      font-size: 44px;
      font-weight: 400;
      color: var(--text);
      letter-spacing: -1px;
      width: 100%;
      -webkit-appearance: none;
    }

    .monto-input::placeholder { color: var(--border2); }

    .err-msg {
      font-size: 10px;
      color: var(--red);
      margin-top: 5px;
      letter-spacing: 0.3px;
    }

    /* ── CHIPS ── */
    .chips-wrap { position: relative; }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      align-items: center;
    }

    .chip {
      display: flex;
      align-items: center;
      gap: 0;
      border-radius: 2px;
      border: 1px solid var(--border2);
      background: transparent;
      overflow: hidden;
      transition: border-color .15s;
    }

    .chip:hover { border-color: var(--muted); }

    .chip-label {
      padding: 6px 12px;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted2);
      cursor: pointer;
      background: none;
      border: none;
      -webkit-tap-highlight-color: transparent;
      white-space: nowrap;
    }

    .chip-edit-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6px 7px;
      background: none;
      border: none;
      border-left: 1px solid var(--border);
      cursor: pointer;
      color: var(--muted);
      transition: all .15s;
      -webkit-tap-highlight-color: transparent;
    }

    .chip-edit-btn:hover { background: var(--s2); color: var(--text); }

    .chip.sel-g { border-color: var(--red-bd); background: var(--red-dim); }
    .chip.sel-g .chip-label { color: var(--red); }
    .chip.sel-g .chip-edit-btn { border-left-color: var(--red-bd); }

    .chip.sel-i { border-color: var(--green-bd); background: var(--green-dim); }
    .chip.sel-i .chip-label { color: var(--green); }
    .chip.sel-i .chip-edit-btn { border-left-color: var(--green-bd); }

    .chip-add-btn {
      padding: 6px 12px;
      border-radius: 2px;
      border: 1px dashed var(--border2);
      background: none;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 10px;
      letter-spacing: 1px;
      color: var(--muted);
      cursor: pointer;
      transition: all .15s;
      -webkit-tap-highlight-color: transparent;
      white-space: nowrap;
    }

    .chip-add-btn:hover { border-color: var(--muted); color: var(--text); }

    /* Subchips */
    .subchips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      margin-top: 12px;
    }

    .subchip {
      display: flex;
      align-items: center;
      border-radius: 2px;
      border: 1px solid var(--border);
      background: var(--s2);
      overflow: hidden;
      transition: border-color .15s;
    }

    .subchip-label {
      padding: 5px 10px;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted2);
      cursor: pointer;
      background: none;
      border: none;
      -webkit-tap-highlight-color: transparent;
      white-space: nowrap;
    }

    .subchip-edit-btn {
      display: flex;
      align-items: center;
      padding: 5px 6px;
      background: none;
      border: none;
      border-left: 1px solid var(--border);
      cursor: pointer;
      color: var(--muted);
      transition: all .15s;
      -webkit-tap-highlight-color: transparent;
    }

    .subchip.sel-g { border-color: var(--red-bd); background: var(--red-dim); }
    .subchip.sel-g .subchip-label { color: var(--red); }
    .subchip.sel-i { border-color: var(--green-bd); background: var(--green-dim); }
    .subchip.sel-i .subchip-label { color: var(--green); }

    .subchip-add-btn {
      padding: 5px 9px;
      border-radius: 2px;
      border: 1px dashed var(--border);
      background: none;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 9px;
      letter-spacing: 1px;
      color: var(--muted);
      cursor: pointer;
      transition: all .15s;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── INLINE ADD/EDIT INPUT ── */
    .inline-form {
      display: none;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .inline-form.show { display: flex; }

    .inline-input {
      flex: 1;
      min-width: 140px;
      background: var(--s2);
      border: 1px solid var(--border2);
      border-radius: 2px;
      padding: 9px 12px;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 12px;
      font-weight: 300;
      color: var(--text);
      outline: none;
      -webkit-appearance: none;
    }

    .inline-input:focus { border-color: var(--gold-bd); }
    .inline-input::placeholder { color: var(--muted); }

    .inline-ok {
      padding: 9px 16px;
      border-radius: 2px;
      border: 1px solid var(--gold-bd);
      background: var(--gold-dim);
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--gold);
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
    }

    .inline-ok:hover { background: var(--gold); color: var(--bg); }

    .inline-cancel {
      padding: 9px 12px;
      border-radius: 2px;
      border: 1px solid var(--border);
      background: none;
      font-size: 12px;
      color: var(--muted);
      cursor: pointer;
    }

    /* ── MODAL EDITAR/ELIMINAR ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: flex-end;
      justify-content: center;
      padding: 0;
    }

    .modal-overlay.show { display: flex; }

    .modal {
      width: 100%;
      max-width: 480px;
      background: var(--s1);
      border: 1px solid var(--border2);
      border-bottom: none;
      border-radius: 12px 12px 0 0;
      padding: 24px 20px 40px;
      animation: slideUp .25s ease;
    }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }

    .modal-title {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .modal-close {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 18px;
      cursor: pointer;
      padding: 0 4px;
      line-height: 1;
    }

    .modal-input {
      width: 100%;
      background: var(--s2);
      border: 1px solid var(--border2);
      border-radius: 2px;
      padding: 12px 14px;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 14px;
      font-weight: 300;
      color: var(--text);
      outline: none;
      margin-bottom: 10px;
      -webkit-appearance: none;
    }

    .modal-input:focus { border-color: var(--gold-bd); }

    .modal-actions {
      display: flex;
      gap: 8px;
      margin-top: 6px;
    }

    .modal-btn {
      flex: 1;
      padding: 12px;
      border-radius: 2px;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all .15s;
      border: none;
    }

    .modal-btn-save {
      background: var(--gold-dim);
      border: 1px solid var(--gold-bd);
      color: var(--gold);
    }

    .modal-btn-save:hover { background: var(--gold); color: var(--bg); }

    .modal-btn-del {
      background: var(--red-dim);
      border: 1px solid var(--red-bd);
      color: var(--red);
    }

    .modal-btn-del:hover { background: rgba(192,112,112,0.25); }

    .modal-btn-cancel {
      background: none;
      border: 1px solid var(--border2);
      color: var(--muted2);
      flex: 0.6;
    }

    /* ── DIVIDER ── */
    .div { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

    /* ── CAMPOS TEXTO / FECHA ── */
    .row { display: flex; gap: 16px; }
    .row .section { flex: 1; }
    .row .section.wide { flex: 1.8; }

    .text-inp {
      width: 100%;
      background: none;
      border: none;
      border-bottom: 1px solid var(--border);
      padding: 9px 0;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 13px;
      font-weight: 300;
      color: var(--text);
      outline: none;
      -webkit-appearance: none;
    }

    .text-inp:focus { border-bottom-color: var(--border2); }
    .text-inp::placeholder { color: var(--muted); }

    input[type="date"].text-inp::-webkit-calendar-picker-indicator {
      filter: invert(0.3);
      cursor: pointer;
    }

    /* ── BOTÓN GUARDAR ── */
    .btn-save {
      width: 100%;
      padding: 15px;
      border-radius: 2px;
      border: none;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all .2s;
      margin-top: 8px;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-save:active { transform: scale(.99); opacity: .85; }
    .btn-save:disabled { opacity: .3; cursor: not-allowed; transform: none; }
    .btn-g { background: var(--red-dim); border: 1px solid var(--red-bd); color: var(--red); }
    .btn-g:hover:not(:disabled) { background: rgba(192,112,112,0.3); }
    .btn-i { background: var(--green-dim); border: 1px solid var(--green-bd); color: var(--green); }
    .btn-i:hover:not(:disabled) { background: rgba(90,170,128,0.3); }

    /* ── ESTADO ── */
    .estado {
      margin-top: 12px;
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-align: center;
      color: var(--muted);
      min-height: 14px;
    }

    .estado.ok { color: var(--green); }
    .estado.fail { color: var(--red); }

    .pending-note {
      font-size: 9px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      text-align: center;
      margin-top: 6px;
    }

    /* ── OFFLINE BAR ── */
    .offline-bar {
      display: none;
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #b89040;
      background: #1a1508;
      border: 1px solid #3a2e10;
      border-radius: 2px;
      padding: 8px 12px;
      margin-bottom: 16px;
    }

    /* ── ANIMACION ENTRADA ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .page > * { animation: fadeUp .3s ease both; }

    /* ── RESPONSIVE ── */
    @media (max-width: 360px) {
      .monto-input { font-size: 36px; }
      .row { flex-direction: column; gap: 0; }
    }
  </style>
</head>
<body>

<!-- MODAL EDITAR CATEGORIA/SUBCATEGORIA -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-title">
      <span id="modalTitle">Editar</span>
      <button class="modal-close" onclick="hideModal()">x</button>
    </div>
    <input class="modal-input" id="modalInput" type="text" maxlength="40" placeholder="Nombre...">
    <div class="modal-actions">
      <button class="modal-btn modal-btn-save" onclick="confirmModalEdit()">Guardar</button>
      <button class="modal-btn modal-btn-del" onclick="confirmModalDelete()">Eliminar</button>
      <button class="modal-btn modal-btn-cancel" onclick="hideModal()">Cancelar</button>
    </div>
  </div>
</div>

<div class="page">
  <div class="header">
    <div>
      <div class="brand">Finanzas</div>
      <div class="brand-sub">Registro personal</div>
    </div>
    <div class="dt-wrap">
      <div class="dt-time" id="dtTime">--:--</div>
      <div class="dt-date" id="dtDate">---</div>
    </div>
  </div>

  <div class="rule"></div>
  <div class="offline-bar" id="offlineBar">Sin conexion - sincronizara al reconectar</div>

  <div class="tipo-row">
    <button class="tipo-btn ag" id="btnG" onclick="setTipo('gasto')">Gasto</button>
    <button class="tipo-btn" id="btnI" onclick="setTipo('ingreso')">Ingreso</button>
  </div>

  <!-- Monto -->
  <div class="section">
    <div class="section-label">Monto</div>
    <div class="monto-wrap">
      <span class="monto-sym">S/</span>
      <input class="monto-input" id="monto" type="text" inputmode="decimal" placeholder="0.00"
        oninput="rawMonto=this.value.replace(/[^0-9.]/g,'')"
        onblur="if(rawMonto)this.value=parseFloat(rawMonto).toLocaleString('es-PE',{minimumFractionDigits:2,maximumFractionDigits:2})"
        onfocus="this.value=rawMonto">
    </div>
    <div class="err-msg" id="eMonto"></div>
  </div>

  <hr class="div">

  <!-- Categoria -->
  <div class="section">
    <div class="section-label">Categoria</div>
    <div class="chips" id="chipsCat"></div>
    <div class="inline-form" id="addCatForm">
      <input class="inline-input" id="addCatInp" placeholder="Nueva categoria..." maxlength="30"
        onkeydown="if(event.key==='Enter')confirmAddCat()">
      <button class="inline-ok" onclick="confirmAddCat()">Ok</button>
      <button class="inline-cancel" onclick="cancelInline('cat')">x</button>
    </div>
    <div class="err-msg" id="eCat"></div>

    <!-- Subcategoria -->
    <div id="subSection" style="display:none;margin-top:14px">
      <div class="section-label">Subcategoria</div>
      <div class="subchips" id="subchips"></div>
      <div class="inline-form" id="addSubForm">
        <input class="inline-input" id="addSubInp" placeholder="Nueva subcategoria..." maxlength="30"
          onkeydown="if(event.key==='Enter')confirmAddSub()">
        <button class="inline-ok" onclick="confirmAddSub()">Ok</button>
        <button class="inline-cancel" onclick="cancelInline('sub')">x</button>
      </div>
    </div>
  </div>

  <hr class="div">

  <div class="row">
    <div class="section">
      <div class="section-label">Fecha</div>
      <input type="date" class="text-inp" id="fecha">
    </div>
    <div class="section wide">
      <div class="section-label">Descripcion</div>
      <input type="text" class="text-inp" id="desc" placeholder="ej. Almuerzo trabajo" maxlength="80">
    </div>
  </div>

  <button class="btn-save btn-g" id="btnSave" onclick="guardar()">Registrar Gasto</button>
  <div class="estado" id="estado"></div>
  <div class="pending-note" id="pendingNote" onclick="if(getPending().length>0&&confirm('Vaciar cola de pendientes?')){savePending([]);}" style="cursor:pointer"></div>
</div>

<script>
var APPS_URL = "https://script.google.com/macros/s/AKfycbx78UpW8elymddcMQcp3LdrVvzuyC384_UHLkcX65z8oDa2oTW13aj7NJJw7X-rmkNz/exec";

var tipo = 'gasto', rawMonto = '', catSel = '', subSel = '';
var modalMode = '', modalTarget = '', modalParent = '';

var defaultData = {
  gasto: {
    cats: ['Alimentacion','Transporte','Salud','Servicios','Entretenimiento','Ahorro','Alquiler'],
    subs: {
      'Alimentacion':    ['Desayuno','Almuerzo','Cena'],
      'Transporte':      ['Bus','Taxi','Gasolina','Estacionamiento'],
      'Salud':           ['Farmacia','Consulta','Laboratorio'],
      'Servicios':       ['Luz','Agua','Internet','Telefono'],
      'Entretenimiento': ['Streaming','Salida','Evento'],
      'Ahorro':          ['Fondo emergencia','Inversion','Meta'],
      'Alquiler':        ['Mensualidad','Mantenimiento']
    }
  },
  ingreso: {
    cats: ['Sueldo','Freelance','Negocio','Inversiones','Otro'],
    subs: {
      'Sueldo':      ['Mensual','Quincenal','Bono'],
      'Freelance':   ['Proyecto','Consultoria','Diseno'],
      'Negocio':     ['Ventas','Servicios','Comision'],
      'Inversiones': ['Dividendos','Intereses','Venta activo'],
      'Otro':        ['Regalo','Premio','Devolucion']
    }
  }
};

function loadData(){
  try { var s=localStorage.getItem('ff_data'); if(s) return JSON.parse(s); } catch(e){}
  return JSON.parse(JSON.stringify(defaultData));
}
function saveData(d){ localStorage.setItem('ff_data',JSON.stringify(d)); }
var data = loadData();

/* FECHA/HORA */
function updateDT(){
  var now=new Date();
  var dd=['Dom','Lun','Mar','Mie','Jue','Vie','Sab'];
  var mm=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  var h=now.getHours().toString().padStart(2,'0');
  var m=now.getMinutes().toString().padStart(2,'0');
  document.getElementById('dtTime').textContent=h+':'+m;
  document.getElementById('dtDate').textContent=dd[now.getDay()]+' '+now.getDate()+' '+mm[now.getMonth()];
}
updateDT(); setInterval(updateDT,30000);

var today = new Date().toISOString().split('T')[0];
document.getElementById('fecha').value = today;

/* OFFLINE */
function checkOnline(){document.getElementById('offlineBar').style.display=navigator.onLine?'none':'block';}
window.addEventListener('online',function(){checkOnline();flushPending();});
window.addEventListener('offline',checkOnline);
checkOnline();

/* RENDER CATEGORIAS */
function renderCats(){
  var c=document.getElementById('chipsCat');
  c.innerHTML='';
  data[tipo].cats.forEach(function(cat){
    var chip=document.createElement('div');
    chip.className='chip'+(catSel===cat?' sel-'+(tipo==='gasto'?'g':'i'):'');

    var lbl=document.createElement('button');
    lbl.className='chip-label';
    lbl.textContent=cat;
    lbl.onclick=function(){selectCat(cat);};

    var editBtn=document.createElement('button');
    editBtn.className='chip-edit-btn';
    editBtn.innerHTML='<svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M8.5 1.5L10.5 3.5L4 10H2V8L8.5 1.5Z" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    editBtn.title='Editar o eliminar';
    editBtn.onclick=function(e){e.stopPropagation();showModal('cat',cat,'');};

    chip.appendChild(lbl);
    chip.appendChild(editBtn);
    c.appendChild(chip);
  });

  var addBtn=document.createElement('button');
  addBtn.className='chip-add-btn';
  addBtn.textContent='+ agregar';
  addBtn.onclick=function(){showInline('cat');};
  c.appendChild(addBtn);
}

/* RENDER SUBCATEGORIAS */
function renderSubs(){
  var sec=document.getElementById('subSection');
  if(!catSel){sec.style.display='none';return;}
  sec.style.display='block';
  var subs=data[tipo].subs[catSel]||[];
  var c=document.getElementById('subchips');
  c.innerHTML='';
  subs.forEach(function(s){
    var sub=document.createElement('div');
    sub.className='subchip'+(subSel===s?' sel-'+(tipo==='gasto'?'g':'i'):'');

    var lbl=document.createElement('button');
    lbl.className='subchip-label';
    lbl.textContent=s;
    lbl.onclick=function(){selectSub(s);};

    var editBtn=document.createElement('button');
    editBtn.className='subchip-edit-btn';
    editBtn.innerHTML='<svg width="10" height="10" viewBox="0 0 12 12" fill="none"><path d="M8.5 1.5L10.5 3.5L4 10H2V8L8.5 1.5Z" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    editBtn.onclick=function(e){e.stopPropagation();showModal('sub',s,catSel);};

    sub.appendChild(lbl);
    sub.appendChild(editBtn);
    c.appendChild(sub);
  });

  var addBtn=document.createElement('button');
  addBtn.className='subchip-add-btn';
  addBtn.textContent='+ agregar';
  addBtn.onclick=function(){showInline('sub');};
  c.appendChild(addBtn);
}

function selectCat(c){
  catSel=catSel===c?'':c;
  subSel='';
  document.getElementById('eCat').textContent='';
  cancelInline('cat'); cancelInline('sub');
  renderCats(); renderSubs();
}

function selectSub(s){
  subSel=subSel===s?'':s;
  renderSubs();
}

/* INLINE ADD */
function showInline(t){
  if(t==='cat'){
    document.getElementById('addCatForm').classList.add('show');
    document.getElementById('addCatInp').focus();
  } else {
    if(!catSel) return;
    document.getElementById('addSubForm').classList.add('show');
    document.getElementById('addSubInp').focus();
  }
}

function cancelInline(t){
  if(t==='cat'){
    document.getElementById('addCatForm').classList.remove('show');
    document.getElementById('addCatInp').value='';
  } else {
    document.getElementById('addSubForm').classList.remove('show');
    document.getElementById('addSubInp').value='';
  }
}

function confirmAddCat(){
  var v=document.getElementById('addCatInp').value.trim();
  if(!v) return;
  if(!data[tipo].cats.includes(v)){
    data[tipo].cats.push(v);
    if(!data[tipo].subs[v]) data[tipo].subs[v]=[];
    saveData(data);
  }
  catSel=v; subSel='';
  cancelInline('cat'); renderCats(); renderSubs();
}

function confirmAddSub(){
  var v=document.getElementById('addSubInp').value.trim();
  if(!v||!catSel) return;
  if(!data[tipo].subs[catSel]) data[tipo].subs[catSel]=[];
  if(!data[tipo].subs[catSel].includes(v)){
    data[tipo].subs[catSel].push(v);
    saveData(data);
  }
  subSel=v;
  cancelInline('sub'); renderSubs();
}

/* MODAL EDITAR/ELIMINAR */
function showModal(mode, target, parent){
  modalMode=mode; modalTarget=target; modalParent=parent;
  document.getElementById('modalTitle').textContent = mode==='cat' ? 'Editar categoria' : 'Editar subcategoria';
  document.getElementById('modalInput').value = target;
  document.getElementById('modalOverlay').classList.add('show');
  setTimeout(function(){document.getElementById('modalInput').focus();},300);
}

function hideModal(){
  document.getElementById('modalOverlay').classList.remove('show');
  modalMode=''; modalTarget=''; modalParent='';
}

function closeModal(e){
  if(e.target === document.getElementById('modalOverlay')) hideModal();
}

function confirmModalEdit(){
  var newName=document.getElementById('modalInput').value.trim();
  if(!newName) return;

  if(modalMode==='cat'){
    var idx=data[tipo].cats.indexOf(modalTarget);
    if(idx>=0){
      data[tipo].cats[idx]=newName;
      var oldSubs=data[tipo].subs[modalTarget]||[];
      delete data[tipo].subs[modalTarget];
      data[tipo].subs[newName]=oldSubs;
      if(catSel===modalTarget) catSel=newName;
      saveData(data);
    }
  } else {
    var cat=modalParent;
    var subs=data[tipo].subs[cat]||[];
    var idx2=subs.indexOf(modalTarget);
    if(idx2>=0){
      subs[idx2]=newName;
      if(subSel===modalTarget) subSel=newName;
      saveData(data);
    }
  }
  hideModal(); renderCats(); renderSubs();
}

function confirmModalDelete(){
  if(modalMode==='cat'){
    data[tipo].cats=data[tipo].cats.filter(function(c){return c!==modalTarget;});
    delete data[tipo].subs[modalTarget];
    if(catSel===modalTarget){catSel='';subSel='';}
    saveData(data);
  } else {
    var cat=modalParent;
    data[tipo].subs[cat]=(data[tipo].subs[cat]||[]).filter(function(s){return s!==modalTarget;});
    if(subSel===modalTarget) subSel='';
    saveData(data);
  }
  hideModal(); renderCats(); renderSubs();
}

/* TIPO */
function setTipo(t){
  tipo=t; catSel=''; subSel='';
  document.getElementById('btnG').className='tipo-btn'+(t==='gasto'?' ag':'');
  document.getElementById('btnI').className='tipo-btn'+(t==='ingreso'?' ai':'');
  document.getElementById('btnSave').className='btn-save btn-'+(t==='gasto'?'g':'i');
  document.getElementById('btnSave').textContent='Registrar '+(t==='gasto'?'Gasto':'Ingreso');
  document.getElementById('estado').className='estado';
  document.getElementById('estado').textContent='';
  cancelInline('cat'); cancelInline('sub');
  renderCats(); renderSubs();
}

/* OFFLINE QUEUE */
function getPending(){try{return JSON.parse(localStorage.getItem('ff_pending')||'[]');}catch(e){return[];}}
function savePending(a){
  localStorage.setItem('ff_pending',JSON.stringify(a));
  var n=a.length;
  document.getElementById('pendingNote').textContent=n>0?n+' pendiente'+(n>1?'s':'')+' de sincronizar':'';
}

async function send(payload){
  var res=await fetch(APPS_URL,{method:'POST',body:JSON.stringify(payload),headers:{'Content-Type':'text/plain'}});
  var j=await res.json();
  if(!j.ok) throw new Error(j.msg||'Error');
}

async function flushPending(){
  var p=getPending(),f=[];
  for(var r of p){
    // Solo enviar registros válidos con tipo y monto
    if(!r.tipo||(r.tipo!=='gasto'&&r.tipo!=='ingreso')||!r.monto||r.monto<=0){
      continue; // descartar registro inválido
    }
    try{await send(r);}catch(e){f.push(r);}
  }
  savePending(f);
}

/* VALIDAR */
function validate(){
  var ok=true;
  if(!rawMonto||isNaN(parseFloat(rawMonto))||parseFloat(rawMonto)<=0){
    document.getElementById('eMonto').textContent='Ingresa un monto valido';ok=false;
  }
  if(!catSel){
    document.getElementById('eCat').textContent='Selecciona una categoria';ok=false;
  }
  return ok;
}

function buildRegistro(){
  var now=new Date();
  return {
    action: 'agregar',
    timestamp: now.toISOString(),
    fechahora: now.toLocaleString('es-PE',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit'}),
    tipo: tipo,
    monto: parseFloat(rawMonto),
    categoria: catSel,
    subcategoria: subSel,
    descripcion: document.getElementById('desc').value.trim(),
    fecha: document.getElementById('fecha').value
  };
}

function resetForm(){
  rawMonto=''; catSel=''; subSel='';
  document.getElementById('monto').value='';
  document.getElementById('desc').value='';
  document.getElementById('fecha').value=today;
  renderCats(); renderSubs();
}

async function guardar(){
  if(!validate()) return;
  var r=buildRegistro();
  var btn=document.getElementById('btnSave');
  var e=document.getElementById('estado');
  btn.disabled=true;

  if(!navigator.onLine){
    var p=getPending();p.push(r);savePending(p);
    e.className='estado ok';e.textContent='Guardado - sincronizara al reconectar';
    resetForm();btn.disabled=false;return;
  }

  e.className='estado';e.textContent='Enviando...';

  try{
    await flushPending();
    await send(r);
    e.className='estado ok';e.textContent='Registrado';
    resetForm();
  } catch(err){
    var p=getPending();p.push(r);savePending(p);
    e.className='estado ok';e.textContent='Guardado - enviara al reconectar';
  }

  btn.disabled=false;
  setTimeout(function(){e.className='estado';e.textContent='';},3000);
}

/* INIT */
// Limpiar pendientes inválidos al cargar
var rawPending = getPending();
var validPending = rawPending.filter(function(r){
  return r.tipo && (r.tipo==='gasto'||r.tipo==='ingreso') && r.monto && parseFloat(r.monto)>0 && r.categoria;
});
if(validPending.length !== rawPending.length){
  savePending(validPending);
}
renderCats(); renderSubs(); savePending(getPending());
if(navigator.onLine) flushPending();
</script>
</body>
